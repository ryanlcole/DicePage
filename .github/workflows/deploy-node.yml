name: Build and deploy Node app to Azure Web App – Endemar Engine

on:
  push:
    branches:
      - main        # or hex-sphere if that’s your active branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Optional: install & test locally before deploy
      - name: Install dependencies
        run: |
          npm ci || npm install
          echo "Build completed."

      # Upload everything except node_modules (Azure rebuilds)
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App (relicgamemaster)
        uses: azure/webapps-deploy@v3
        id: deploy1
        with:
          app-name: 'relicgamemaster'
          slot-name: 'Production'

      # (Optional) Deploy same build to the mirror app
      - name: Deploy to Azure Web App (relicgamemaster2)
        uses: azure/webapps-deploy@v3
        id: deploy2
        with:
          app-name: 'relicgamemaster2'
          slot-name: 'Production'
