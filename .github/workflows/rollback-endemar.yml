name: 🔄 Rollback Endemar Production (with Artifact Picker)

on:
  workflow_dispatch:
    inputs:
      artifact-choice:
        type: choice
        description: "Select a previous deployment artifact to rollback"
        required: true
        options: []

jobs:
  prepare-list:
    name: 🧩 Collect recent artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-list: ${{ steps.list.outputs.names }}
    steps:
      - name: List recent artifacts
        id: list
        run: |
          echo "names=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[:5] | map(.name) | join(",")')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback:
    name: ⏪ Redeploy selected artifact to relicgamemaster (Production)
    runs-on: ubuntu-latest
    needs: prepare-list
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download selected artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact-choice }}

      - name: Deploy artifact to relicgamemaster (production)
        uses: azure/webapps-deploy@v3
        id: rollback-prod
        with:
          app-name: "relicgamemaster"
          slot-name: "Production"

      - name: Confirmation
        run: echo "✅ Rolled back using artifact: ${{ github.event.inputs.artifact-choice }}"

