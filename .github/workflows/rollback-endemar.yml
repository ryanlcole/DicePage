name: 🔄 Rollback Endemar Production

on:
  workflow_dispatch:
    inputs:
      artifact-id:
        description: "Artifact name or ID from previous deployment (see Actions history)"
        required: true
        default: "node-app"

jobs:
  rollback:
    name: ⏪ Redeploy previous artifact to relicgamemaster (Production)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact from previous workflow
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact-id }}

      - name: Deploy artifact to relicgamemaster (production)
        uses: azure/webapps-deploy@v3
        id: rollback-prod
        with:
          app-name: "relicgamemaster"
          slot-name: "Production"

      - name: Confirmation
        run: echo "✅ Rolled back using artifact: ${{ github.event.inputs.artifact-id }}"
