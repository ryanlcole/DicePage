name: Deploy Endemar Engine (Two-App Free Setup + Auto Backup)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci || npm install
          echo "✅ Build complete."

      - name: Name artifact
        id: name-artifact
        run: |
          DATE=$(date +'%Y-%m-%d')
          SHORT=$(git rev-parse --short HEAD)
          echo "artifact_name=node-app-${DATE}_${SHORT}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name-artifact.outputs.artifact_name }}
          path: |
            .
            !node_modules/

  deploy-staging:
    name: 🚀 Deploy to Staging (relicgamemaster2)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to relicgamemaster2 (staging)
        uses: azure/webapps-deploy@v3
        id: deploy-staging
        with:
          app-name: 'relicgamemaster2'
          slot-name: 'Production'

  approve-promotion:
    name: 🧭 Await manual approval for Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://relicgamemaster2.azurewebsites.net
    steps:
      - name: Instructions
        run: |
          echo "✅ Review staging at https://relicgamemaster2.azurewebsites.net"
          echo "🧭 Once validated, click 'Approve Deployment' in GitHub Actions to continue."

  promote-production:
    name: 🚀 Promote build to Production (relicgamemaster)
    runs-on: ubuntu-latest
    needs: [approve-promotion, build]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to relicgamemaster (production)
        uses: azure/webapps-deploy@v3
        id: deploy-prod
        with:
          app-name: 'relicgamemaster'
          slot-name: 'Production'

      - name: Confirmation
        run: echo "✅ Deployed and backed up as ${{ needs.build.outputs.artifact_name }}"
